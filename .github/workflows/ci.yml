name: CI

on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.8.5"
  TF_ENV: Terraform/envs/vcenter

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Check Terraform formatting
        working-directory: Terraform
        run: terraform fmt -check -recursive

      - name: Initialize Terraform
        working-directory: ${{ env.TF_ENV }}
        run: terraform init -backend=false -lockfile=readonly

      - name: Validate Terraform
        working-directory: ${{ env.TF_ENV }}
        run: terraform validate

      - name: Render Terraform Docker Compose config
        working-directory: Terraform
        run: docker compose --env-file .env.compose.example -f docker-compose.yml config

      - name: Build Terraform runtime image
        working-directory: Terraform
        run: docker build --build-arg TERRAFORM_VERSION="${TERRAFORM_VERSION}" -f docker/Dockerfile .

  ansible:
    name: Ansible
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ansible-core

      - name: Check Ansible playbook syntax
        working-directory: Ansible
        run: |
          ansible-playbook playbooks/deploy.yaml --syntax-check
          ansible-playbook playbooks/predeploy-show-info.yaml --syntax-check

      - name: Render Ansible Docker Compose config
        working-directory: Ansible
        run: docker compose --env-file .env.example -f docker-compose.yaml config

      - name: Build Ansible runtime image
        working-directory: Ansible
        run: docker build -f build/dockerfile .

  scripts:
    name: Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell syntax
        run: |
          bash -n Terraform/scripts/run-terraform.sh
          bash -n Terraform/scripts/build-docker-offline-bundle.sh
          bash -n Ansible/scripts/run-ansible.sh
          bash -n Ansible/scripts/run-ssh-copy-id-password.sh
          bash -n Ansible/scripts/build-offline-bundle.sh
          bash -n Ansible/scripts/prepare-offline-control.sh
