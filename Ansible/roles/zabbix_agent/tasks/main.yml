---
- name: Validate Zabbix agent configuration
  ansible.builtin.assert:
    that:
      - zabbix_agent_server_host | length > 0
      - zabbix_agent_hostname | length > 0
    fail_msg: "Set zabbix_agent_server_host and zabbix_agent_hostname before running the zabbix_agent role."
  tags:
    - zabbix
    - zabbix_agent

- name: Update apt cache for Zabbix agent
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: not zabbix_agent_install_from_local_repo | bool
  tags:
    - zabbix
    - zabbix_agent

- name: Install Zabbix agent from apt repositories
  ansible.builtin.apt:
    name: "{{ zabbix_agent_packages }}"
    state: present
  when: not zabbix_agent_install_from_local_repo | bool
  tags:
    - zabbix
    - zabbix_agent

- name: Create Zabbix local repo directory
  ansible.builtin.file:
    path: "{{ zabbix_agent_repo_dest }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: zabbix_agent_install_from_local_repo | bool
  tags:
    - zabbix
    - zabbix_agent

- name: Copy Zabbix local deb repository
  ansible.builtin.copy:
    src: "{{ zabbix_agent_repo_source }}/"
    dest: "{{ zabbix_agent_repo_dest }}/"
    owner: root
    group: root
    mode: preserve
  when: zabbix_agent_install_from_local_repo | bool
  tags:
    - zabbix
    - zabbix_agent

- name: Find Zabbix deb packages
  ansible.builtin.find:
    paths: "{{ zabbix_agent_repo_dest }}"
    patterns: "*.deb"
    file_type: file
  register: zabbix_agent_local_debs
  when: zabbix_agent_install_from_local_repo | bool
  tags:
    - zabbix
    - zabbix_agent

- name: Validate Zabbix local deb repository
  ansible.builtin.assert:
    that:
      - zabbix_agent_local_debs.matched | int > 0
    fail_msg: "No .deb files found in {{ zabbix_agent_repo_dest }}. Add Zabbix agent packages under {{ zabbix_agent_repo_source }} before running offline."
  when: zabbix_agent_install_from_local_repo | bool
  tags:
    - zabbix
    - zabbix_agent

- name: Install Zabbix agent from local deb repository
  ansible.builtin.shell: apt-get install -y "{{ zabbix_agent_repo_dest }}"/*.deb
  args:
    executable: /bin/bash
  when: zabbix_agent_install_from_local_repo | bool
  tags:
    - zabbix
    - zabbix_agent

- name: Configure Zabbix server
  ansible.builtin.lineinfile:
    path: "{{ zabbix_agent_config_file }}"
    regexp: "^Server="
    line: "Server={{ zabbix_agent_server_host }}"
    backup: true
  notify: Restart zabbix agent
  tags:
    - zabbix
    - zabbix_agent

- name: Configure Zabbix active server
  ansible.builtin.lineinfile:
    path: "{{ zabbix_agent_config_file }}"
    regexp: "^ServerActive="
    line: "ServerActive={{ zabbix_agent_server_active }}"
    backup: true
  notify: Restart zabbix agent
  tags:
    - zabbix
    - zabbix_agent

- name: Configure Zabbix agent hostname
  ansible.builtin.lineinfile:
    path: "{{ zabbix_agent_config_file }}"
    regexp: "^Hostname="
    line: "Hostname={{ zabbix_agent_hostname }}"
    backup: true
  notify: Restart zabbix agent
  tags:
    - zabbix
    - zabbix_agent

- name: Enable and start Zabbix agent
  ansible.builtin.systemd:
    name: "{{ zabbix_agent_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
  tags:
    - zabbix
    - zabbix_agent
