---
zabbix_agent_enabled: false
zabbix_agent_install_from_local_repo: false
zabbix_agent_repo_source: ./repo/zabbix
zabbix_agent_repo_dest: /media/installation/zabbix
zabbix_agent_packages:
  - zabbix-agent
zabbix_agent_service_name: zabbix-agent
zabbix_agent_config_file: /etc/zabbix/zabbix_agentd.conf
zabbix_agent_server_host: ""
zabbix_agent_server_active: "{{ zabbix_agent_server_host }}"
zabbix_agent_hostname: "{{ inventory_hostname }}"
